<!DOCTYPE html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>{% block title %}ScrapeKit Colombia{% endblock %}</title>
    <style>
/* =====================================================================
   ScrapeKit Colombia — Brand tokens (light mode)
   ===================================================================== */
[data-theme="light"] {
  --bg:             #FBFAF6;
  --surface:        #FFFFFF;
  --surface-2:      #F4F1E9;
  --border:         #E5DFD2;
  --text:           #14202E;
  --text-muted:     #51606F;
  --primary:        #0F766E;
  --primary-strong: #115E59;
  --on-primary:     #FFFFFF;
  --accent:         #B5791A;
  --accent-strong:  #9A6712;
  --on-accent:      #FFFFFF;
  --link:           #0F766E;
  --ring:           #0F766E;
  --success:        #0F766E;
  --warning:        #92610A;
  --danger:         #B42318;
}

/* =====================================================================
   ScrapeKit Colombia — main.css
   Modo: light (data-theme="light" en <html>)
   Paleta: teal primario, dorado acento — brand-tokens canonicos.
   ===================================================================== */

/* --- Reset minimo y tipografia ---------------------------------------- */
*, *::before, *::after { box-sizing: border-box; }

:root {
  font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 16px;
  line-height: 1.5;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
}

/* --- Layout ------------------------------------------------------------ */
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 1rem 1.5rem;
}

/* --- Header ------------------------------------------------------------ */
.header {
  background: var(--primary-strong);
  color: var(--on-primary);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
  padding: 1rem 0;
}

.header h1 {
  margin: 0 0 0.25rem;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--on-primary);
}

.header p {
  margin: 0;
  opacity: 0.9;
  font-size: 0.95rem;
  color: var(--on-primary);
}

/* --- Cards ------------------------------------------------------------- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-top: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 4px 16px rgba(15, 118, 110, 0.08);
}

.card h2 {
  margin: 0 0 1rem;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
}

/* --- Forms ------------------------------------------------------------- */
.form {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.form label {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text);
}

.form-row {
  display: flex;
  gap: 0.75rem;
}

.form input,
.form select {
  flex: 1;
  padding: 0.75rem 1rem;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  font-family: inherit;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.form input::placeholder {
  color: var(--text-muted);
}

.form input:focus,
.form select:focus {
  outline: 2px solid var(--ring);
  outline-offset: 1px;
  border-color: var(--primary);
}

/* Primary action button */
.form button {
  padding: 0.75rem 1.5rem;
  border: none;
  border-radius: 10px;
  background: var(--primary-strong);
  color: var(--on-primary);
  font-weight: 600;
  font-size: 1rem;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
  white-space: nowrap;
}

.form button:hover {
  background: var(--primary);
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(15, 118, 110, 0.25);
}

.form button:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

.form button:active {
  transform: none;
  box-shadow: none;
}

/* --- Help / Status text ------------------------------------------------ */
.help {
  margin: 0;
  font-size: 0.88rem;
  color: var(--text-muted);
}

.status {
  min-height: 1.25rem;
  font-size: 0.9rem;
  color: var(--text-muted);
}

.status.success { color: var(--success); }
.status.error   { color: var(--danger);  }
.status.info    { color: var(--primary); }

/* --- Search results ---------------------------------------------------- */
.search-results {
  list-style: none;
  padding: 0;
  margin: 1rem 0 0;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.search-result {
  padding: 1rem 1.25rem;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface-2);
}

.search-result__title {
  margin: 0 0 0.5rem;
  font-size: 1.02rem;
  font-weight: 600;
  color: var(--link);
  text-decoration: none;
}

.search-result__title:hover {
  text-decoration: underline;
}

.search-result__meta {
  display: flex;
  gap: 1rem;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}

.search-result__snippet {
  font-size: 0.95rem;
  line-height: 1.5;
  color: var(--text);
}

/* Highlight mark: dorado acento — WCAG AA sobre blanco (#FFF8E7 bg, #92610A texto) */
.search-result__snippet mark {
  background: #FEF3C7;
  color: var(--warning);
  padding: 0 0.2rem;
  border-radius: 4px;
}

/* --- Table ------------------------------------------------------------- */
.table-container {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.table {
  width: 100%;
  border-collapse: collapse;
  display: block;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.table thead {
  background: var(--surface-2);
  text-transform: uppercase;
  font-size: 0.78rem;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

.table th,
.table td {
  padding: 0.75rem 0.6rem;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  color: var(--text);
}

.table th {
  font-weight: 700;
  color: var(--text-muted);
}

.table tbody tr:hover {
  background: var(--surface-2);
}

/* --- Button link (Ver / Ver detalle) ----------------------------------- */
.button-link {
  display: inline-block;
  padding: 0.35rem 0.85rem;
  border-radius: 999px;
  background: var(--primary-strong);
  color: var(--on-primary);
  text-decoration: none;
  font-weight: 600;
  font-size: 0.83rem;
  transition: background 0.15s ease;
}

.button-link:hover {
  background: var(--primary);
}

.button-link:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

/* --- Back link --------------------------------------------------------- */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  margin-bottom: 1rem;
  text-decoration: none;
  color: var(--link);
  font-weight: 500;
  font-size: 0.95rem;
}

.back-link:hover {
  text-decoration: underline;
}

.back-link:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
  border-radius: 4px;
}

/* --- Summary (detail page) -------------------------------------------- */
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
}

.summary dt {
  font-weight: 700;
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  margin-bottom: 0.2rem;
}

.summary dd {
  margin: 0;
  font-size: 0.95rem;
  color: var(--text);
}

.summary dd a {
  color: var(--link);
  text-decoration: underline;
}

.summary dd code {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.1rem 0.4rem;
  font-size: 0.88rem;
  color: var(--text);
}

/* --- Document content -------------------------------------------------- */
.document-content {
  max-height: 65vh;
  overflow-y: auto;
  padding-right: 1rem;
  line-height: 1.6;
  white-space: pre-wrap;
  color: var(--text);
}

/* --- Footer ------------------------------------------------------------ */
.footer {
  background: var(--primary-strong);
  color: var(--on-primary);
  padding: 1rem 0;
  margin-top: 2rem;
}

.footer small {
  color: var(--on-primary);
  opacity: 0.85;
  font-size: 0.85rem;
}

/* --- Responsive -------------------------------------------------------- */
@media (max-width: 768px) {
  .form-row  { flex-direction: column; }
  .card      { padding: 1rem; }
  .table     { min-width: 600px; font-size: 0.875rem; }
}
    </style>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h1>ScrapeKit Colombia</h1>
        <p>Indexador de documentos legislativos PDF - Camara, Senado y mas.</p>
      </div>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    <footer class="footer">
      <div class="container">
        <small>&copy; {{ year }} ScrapeKit Colombia &mdash; stevenvo780</small>
      </div>
    </footer>
    {% block scripts %}{% endblock %}
  </body>
</html>
