<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Nómos">
  <defs>
    <linearGradient id="nm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131e22"/>
      <stop offset="1" stop-color="#0b1417"/>
    </linearGradient>
    <linearGradient id="nm-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43b5a6"/>
      <stop offset="1" stop-color="#2a7a70"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background (Nómos isotipo shape) -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="url(#nm-bg)" stroke="url(#nm-border)" stroke-width="1.5"/>
  <!-- § symbol (section sign — symbol of Nómos) -->
  <text x="32" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#43b5a6" text-anchor="middle">§</text>
</svg>
